name: Daily price ingest

# Triggers the deployed app's ingestion endpoint once per day, one game at a
# time (each call stays well under Vercel's function time limit). This works on
# Vercel's Hobby plan, which caps cron jobs at 2/day — GitHub Actions has no
# such limit.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   INGEST_BASE_URL  e.g. https://your-app.vercel.app   (no trailing slash)
#   CRON_SECRET      the same value set in Vercel env vars

on:
  schedule:
    # 6 runs/day, one hour apart, starting at tcgcsv's ~20:00 UTC refresh. The
    # source only updates once a day, so these runs exist to reliably CATCH that
    # update (and re-fetch if an early run lands before it, or a run is skipped).
    # Snapshots upsert, so the freshest run of the day wins.
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest each game
        env:
          BASE: ${{ secrets.INGEST_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          # game:language pairs. Only Pokémon has a Japanese catalog on TCGplayer
          # (category 85); One Piece and Riftbound are English-only there.
          for target in "pokemon:EN" "pokemon:JP" "onepiece:EN" "riftbound:EN"; do
            game="${target%%:*}"; lang="${target##*:}"
            echo "::group::Ingesting $game ($lang)"
            code=$(curl -sS --max-time 300 -o /tmp/out.json -w "%{http_code}" \
              -H "Authorization: Bearer $SECRET" \
              "$BASE/api/ingest?game=$game&language=$lang")
            cat /tmp/out.json; echo
            echo "::endgroup::"
            if [ "$code" != "200" ]; then
              echo "Ingest for $game ($lang) failed with HTTP $code"
              exit 1
            fi
          done
